<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver Watch — Fleet Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="setupWarning" class="setup-warning hidden">
    ⚠ <strong>Backend not configured.</strong> Cross-device sync is disabled — fill in <code>firebase-config.js</code>.
  </div>

  <header>
    <h1>Driver Watch — Fleet</h1>
    <div id="fleetStats" class="fleet-stats">0 drivers</div>
  </header>

  <main>
    <section class="cards-section">
      <h2>Active drivers</h2>
      <div id="cardsGrid" class="cards-grid">
        <div class="empty" id="emptyCards">No drivers connected yet. Open <code>/drive/</code> on a device to start a session.</div>
      </div>
    </section>

    <section class="map-section">
      <h2>Live fleet map</h2>
      <div id="map"></div>
    </section>

    <section class="incidents-section">
      <h2>Recent incidents</h2>
      <div id="incidentList" class="incident-list">
        <div class="empty">No incidents recorded.</div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="app.js"></script>
</body>
</html>
