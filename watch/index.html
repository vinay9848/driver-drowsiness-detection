<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver Watch — Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Driver Watch</h1>
    <div id="connection" class="connection offline">waiting for driver</div>
  </header>

  <main>
    <section id="statusCard" class="status-card stage-idle">
      <div class="big-status" id="bigStatus">IDLE</div>
      <div class="status-sub" id="statusSub">No driver session active</div>
    </section>

    <section class="metrics-grid">
      <div class="metric-tile"><div class="label">Stage</div><div class="value" id="stageVal">—</div></div>
      <div class="metric-tile"><div class="label">EAR</div><div class="value" id="earVal">—</div></div>
      <div class="metric-tile"><div class="label">MAR</div><div class="value" id="marVal">—</div></div>
      <div class="metric-tile"><div class="label">Session</div><div class="value" id="sessionVal">—</div></div>
    </section>

    <section class="gauge-section">
      <h2>Fatigue level</h2>
      <div class="gauge-wrap">
        <svg viewBox="0 0 200 120" id="gaugeSvg">
          <path d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#1a1f2e" stroke-width="18" stroke-linecap="round"/>
          <path id="gaugeFill" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#4ade80" stroke-width="18" stroke-linecap="round" stroke-dasharray="0 251"/>
        </svg>
        <div class="gauge-text" id="gaugeText">0</div>
      </div>
    </section>

    <section class="map-section">
      <h2>Live location</h2>
      <div id="map"></div>
      <div class="gps-info" id="gpsInfo">No location yet</div>
    </section>

    <section class="incidents-section">
      <h2>Incidents</h2>
      <div id="incidentList" class="incident-list">
        <div class="empty">No incidents recorded.</div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
